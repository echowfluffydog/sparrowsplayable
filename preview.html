<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<title>Sparrows Playable — Preview</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  html, body {
    height: 100%; width: 100%;
    background: #1a1a1a;
    font-family: -apple-system, system-ui, sans-serif;
    color: #aaa;
    overflow: hidden;
  }
  .wrap {
    width: 100%; height: 100%;
    display: flex; flex-direction: column; align-items: center; justify-content: center;
    gap: 18px;
    padding: 20px;
  }
  .label {
    font-size: 12px; letter-spacing: 1.2px; text-transform: uppercase;
    color: #888;
  }
  /* Phone frame — fits the larger of (max-width, height-fit aspect) */
  .phone {
    /* portrait 9:19.5 — modern iPhone aspect */
    aspect-ratio: 9 / 19.5;
    height: min(92vh, calc(92vw * 19.5 / 9));
    max-height: 92vh;
    background: #000;
    border-radius: 36px;
    border: 10px solid #2b2b2b;
    box-shadow: 0 12px 36px rgba(0,0,0,0.6), inset 0 0 0 1px #444;
    overflow: hidden;
    position: relative;
  }
  .phone iframe {
    width: 100%; height: 100%;
    border: 0; display: block;
    background: #3D5A3F;
  }
  .reload {
    color: #888; font-size: 12px; cursor: pointer;
    background: #2b2b2b; padding: 6px 14px; border-radius: 18px;
    border: 1px solid #444;
  }
  .reload:hover { color: #ccc; background: #333; }

  /* On a real phone, drop the frame and go full-bleed */
  @media (max-width: 600px), (pointer: coarse) and (max-height: 900px) {
    .label, .reload { display: none; }
    .wrap { padding: 0; gap: 0; }
    .phone {
      width: 100%; height: 100%; max-height: none; aspect-ratio: auto;
      border: 0; border-radius: 0; box-shadow: none;
    }
  }
</style>
</head>
<body>
<div class="wrap">
  <div class="label">Sparrows playable preview · 9 : 19.5 portrait</div>
  <div class="phone"><iframe id="frame" src="index.html"></iframe></div>
  <button class="reload" onclick="document.getElementById('frame').src = document.getElementById('frame').src">Reload</button>
</div>
</body>
</html>
